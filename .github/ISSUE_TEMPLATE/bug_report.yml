name: Bug 反馈
description: 反馈 xAgent 或使用手册中的明确问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息，不要提交真实密钥、token、客户数据、内部地址或敏感截图。
  - type: dropdown
    id: area
    attributes:
      label: 问题范围
      description: 这个问题主要发生在哪里？
      options:
        - 使用手册
        - Agent 会话
        - Skill
        - Tool
        - Connector / MCP
        - 模型配置
        - 审批 / 安全策略
        - 部署 / 启动
        - 其他
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明遇到了什么问题。
      placeholder: 例如：按照文档操作后，页面没有显示预期入口。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写出尽量明确的操作步骤。
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 输入 ...
        4. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你认为正确行为应该是什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际发生了什么？如有报错，请贴关键报错文本。
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 如果和运行环境有关，请填写；只反馈文档问题可以写“无”。
      placeholder: |
        xAgent 版本：
        操作系统：
        浏览器：
        部署方式：
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图或补充材料
      description: 可选。请先遮盖内部地址、账号、密钥、客户信息和业务敏感内容。
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经确认 issue 中没有真实密钥、token、验证码、客户数据或内部敏感信息。
          required: true
        - label: 我已经尽量提供可复现步骤或明确的文档位置。
          required: true
